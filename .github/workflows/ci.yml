name: CI — RiskLab API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Pruebas unitarias & lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Ejecutar pruebas pytest
        working-directory: backend
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

      - name: Verificar que el módulo importa correctamente
        working-directory: backend
        run: |
          python -c "from app.main import app; print('✓ app.main importa OK')"
          python -c "from app.services import EWMAService, BondService, OptionPricer, StressTester; print('✓ services importan OK')"
          python -c "from app.database import engine, Base; print('✓ database importa OK')"

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build imagen Docker
        run: docker build -t risklab-api:ci --target runtime .

      - name: Verificar health del contenedor
        run: |
          docker run -d --name risklab-test -p 8000:8000 risklab-api:ci
          sleep 15
          curl --fail http://localhost:8000/health || (docker logs risklab-test && exit 1)
          docker stop risklab-test
