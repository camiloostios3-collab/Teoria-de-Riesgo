version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: risklab-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # persistir SQLite
      - ./backend/.env:/app/.env  # variables de entorno
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    image: python:3.11.9-slim-bookworm
    container_name: risklab-frontend
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install -q streamlit requests plotly pandas numpy &&
             streamlit run app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
